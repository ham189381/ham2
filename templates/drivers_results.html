<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Available Drivers | Heavy Transport</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #eef2f5;
            padding: 2rem 1rem;
        }

        h2 {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: #1e2a3e;
            letter-spacing: -0.3px;
            position: relative;
            display: inline-block;
            width: 100%;
        }
        
        h2:after {
            content: '';
            display: block;
            width: 80px;
            height: 4px;
            background: #2b7a3e;
            margin: 12px auto 0;
            border-radius: 4px;
        }

        /* responsive grid container */
        .driver-container {
            width: 95%;
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 28px;
            justify-items: center;
            align-items: stretch;
        }

        /* CARD STYLES — image as full background */
        .driver-table {
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.3);
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            background-color: #1f2a2e;  /* fallback color if image fails */
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            /* ensure the background fully covers the card area */
            display: flex;
            flex-direction: column;
        }

        .driver-table:hover {
            transform: translateY(-6px);
            box-shadow: 0 28px 36px -14px rgba(0, 0, 0, 0.4);
        }

        /* info table overlay — appears ON TOP of image */
        .driver-table table {
            width: 100%;
            background: rgba(10, 20, 18, 0.78);  /* deep translucent overlay */
            backdrop-filter: blur(2.5px);
            border-collapse: separate;
            border-spacing: 0;
            padding: 1.2rem 1rem 1.5rem 1rem;
            color: #ffffff;
            border-radius: 24px;
            /* soft border inside for extra readability */
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
            transition: background 0.2s;
        }

        /* table cells styling */
        .driver-table td {
            padding: 12px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 1rem;
            letter-spacing: 0.3px;
        }

        /* last row without border */
        .driver-table tr:last-child td {
            border-bottom: none;
        }

        /* label styling (bold & subtle) */
        .driver-table td:first-child {
            font-weight: 700;
            width: 38%;
            color: #f9f3c1;
            text-shadow: 0 1px 1px rgba(0,0,0,0.4);
            font-size: 1.02rem;
        }

        .driver-table td:last-child {
            font-weight: 500;
            text-shadow: 0 1px 1px rgba(0,0,0,0.3);
        }

        /* call button — vivid and accessible */
        .call-btn {
            display: inline-block;
            background: linear-gradient(135deg, #1e7e34, #0f5e26);
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .call-btn:hover {
            background: linear-gradient(135deg, #2a9d44, #136b2c);
            transform: scale(1.02);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
            text-decoration: none;
        }

        .call-btn:active {
            transform: scale(0.98);
        }

        /* make the phone number area more click-friendly */
        .driver-table td:last-child {
            vertical-align: middle;
        }

        /* adjust table responsive text */
        @media (max-width: 620px) {
            .driver-container {
                gap: 20px;
                width: 100%;
            }
            .driver-table table {
                padding: 1rem 0.75rem;
            }
            .driver-table td {
                padding: 10px 6px;
                font-size: 0.9rem;
            }
            .call-btn {
                padding: 6px 16px;
                font-size: 0.85rem;
            }
            h2 {
                font-size: 1.9rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem 0.75rem;
            }
            .driver-table td:first-child {
                width: 42%;
                font-size: 0.9rem;
            }
            .driver-table td:last-child {
                font-size: 0.88rem;
            }
        }

        /* additional subtle touch: smooth appearance */
        .driver-table {
            animation: fadeSlideUp 0.4s ease-out;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ensure background readability even on low contrast images */
        .driver-table table {
            text-rendering: optimizeLegibility;
        }
    </style>
</head>
<body>

<h2>🚛 Available Drivers</h2>

<div class="driver-container">
    {% for driver in drivers %}
    <!-- each card: background image set inline, content on top -->
    <a href="{{ url_for('driver_details', driver_id=driver.id) }}" class="card-link">
    <div class="driver-table" 
         style="background-image: url('{{ url_for('static', filename=driver['image1']) }}'); 
                background-size: cover; 
                background-position: center 20%;">
        <table>
            <tr>
                <td><strong>👤 Name</strong></td>
                <td>{{ driver['name'] }}</td>
            </tr>
            <tr>
                <td><strong>🚛 Truck</strong></td>
                <td>{{ driver['truck_name'] }}</td>
            </tr>
            <tr>
                <td><strong>📍 District</strong></td>
                <td>{{ driver['district'] }}</td>
            </tr>
            <tr>
                <td><strong>🏙️ Town</strong></td>
                <td>{{ driver['town'] }}</td>
            </tr>
            <tr>
                <td><strong>📞 Phone</strong></td>
                <td>
                    <a href="tel:{{ driver['phone'] }}" class="call-btn">📞 Call Now</a>
                </td>
            </tr>
             <tr>
        {% if driver.location %}
            <td><a href="https://www.google.com/maps/search/?api=1&query={{ driver.location | urlencode }}" target="_blank" class="map-link">
                📍 View location
            </a>
            </td>
        {% endif %}
        </tr>
        </table>
    </div></a>
    {% endfor %}

</div>

</body>
</html>
