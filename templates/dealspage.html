<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <script src='main.js'></script>
    <style>
        .menu-container {
            width: 100%;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            margin-bottom:0;
		
        }

        .menu-bar {
            display: flex;
            width: 100%;
        }

        .menu-item {
            flex: 1;
            text-align: center;
            padding: 0.1em 10px;
            transition: all 0.3s ease;
            cursor: pointer;
            border-right: 1px solid #f0f0f0;
        }

        .menu-item a{
            text-decoration: none;
        }

        .menu-item:last-child {
            border-right: none;
        }

        .menu-item:hover {
            background-color: #f8f9fa;
            transform: translateY(-2px);
        }

        .menu-item.active {
            background-color: #4a6ee0;
            color: white;
        }

        .menu-item h2 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .menu-item p {
            font-size: 0.9rem;
            color: #666;
            opacity: 0.8;
        }

        .menu-item.active p {
            color: rgba(255, 255, 255, 0.9);
        }

     /* Responsive Design for the menue */
	 
	 
        @media (max-width: 768px) {
            .menu-bar {
                flex-direction: column;
            }
            
            .menu-item {
                border-right: none;
                border-bottom: 1px solid #f0f0f0;
            }
            
            .menu-item:last-child {
                border-bottom: none;
            }
            
            .menu-item h2 {
                font-size: 1.3rem;
            }
            
            h1 {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            .menu-item h2 {
                font-size: 1.1rem;
            }
            
            .menu-item p {
                font-size: 0.8rem;
            }
            
            h1 {
                font-size: 1.7rem;
            }
        }


    </style>
</head>
<body>
    <div class="menu-container">
            <div class="menu-bar">

               
                <div class="menu-item active">
                    <a href="{{url_for('deals')}}">
                    <h2>UPLOAD DEAL</h2>
                    <p>sale your deal here</p>
                    </a>
                </div>
                

                <div class="menu-item">
                    <a href="{{url_for('dealstocustomer')}}">
                    <h2>VIEW DEALS ON WHEELS</h2>
                    <p>see the available deals</p>
                    </a>
                </div>
                
            </div>
        </div>
</body>
</html>
