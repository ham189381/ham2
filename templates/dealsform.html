<!-- Add this JavaScript to your dealsform.html -->
<script>
// Get user's current location when form loads
window.addEventListener('DOMContentLoaded', () => {
    if ("geolocation" in navigator) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                document.getElementById('live_latitude').value = position.coords.latitude;
                document.getElementById('live_longitude').value = position.coords.longitude;
                document.getElementById('location-status').innerHTML = '✅ Location captured!';
                document.getElementById('location-status').style.color = 'green';
            },
            (error) => {
                document.getElementById('location-status').innerHTML = '⚠️ Unable to get location. Please enable GPS.';
                document.getElementById('location-status').style.color = 'orange';
            }
        );
    } else {
        document.getElementById('location-status').innerHTML = '❌ Geolocation not supported';
    }
});

// Start continuous tracking after form submission
function startLiveTracking(dealId) {
    setInterval(() => {
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition((position) => {
                fetch(`/update_live_location/${dealId}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude,
                        accuracy: position.coords.accuracy
                    })
                });
            });
        }
    }, 10000); // Update every 10 seconds
}
</script>

<!-- Add hidden fields to your form -->
<input type="hidden" id="live_latitude" name="live_latitude">
<input type="hidden" id="live_longitude" name="live_longitude">
<div id="location-status" style="margin: 10px 0; font-size: 12px;">📍 Getting your location...</div>
