<script>
// Get user's live location
function getLiveLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            function(position) {
                document.getElementById('live_latitude').value = position.coords.latitude;
                document.getElementById('live_longitude').value = position.coords.longitude;
                document.getElementById('location_status').innerHTML = 
                    '✅ Location captured: ' + position.coords.latitude + ', ' + position.coords.longitude;
            },
            function(error) {
                document.getElementById('location_status').innerHTML = 
                    '❌ Error getting location: ' + error.message;
            }
        );
    } else {
        document.getElementById('location_status').innerHTML = 
            '❌ Geolocation is not supported by this browser';
    }
}

// Call this when page loads or when user clicks a button
window.onload = function() {
    getLiveLocation();
}
</script>

<!-- Add hidden fields to your form -->
<input type="hidden" id="live_latitude" name="live_latitude">
<input type="hidden" id="live_longitude" name="live_longitude">
<div id="location_status">Getting your location...</div>
