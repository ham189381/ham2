<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deals Form</title>
</head>
<body>
    <h2>Deals Form</h2>
    <form action="/save" method="POST" enctype="multipart/form-data">
        <label>Supplier Name:</label><br>
        <input type="text" name="suppliername" required><br><br>
        
        <label>Material Name:</label><br>
        <input type="text" name="materialname" required><br><br>
        
        <label>Tipper Name:</label><br>
        <input type="text" name="tippername" required><br><br>
        
        <label>Location:</label><br>
        <input type="text" name="location" required><br><br>
        
        <label>Phone:</label><br>
        <input type="text" name="phone" required><br><br>
        
        <label>Image One:</label><br>
        <input type="file" name="imageone"><br><br>
        
        <label>Image Two:</label><br>
        <input type="file" name="image2"><br><br>
        
        <input type="submit" value="Upload Deal">
    </form>
</body>
</html>
