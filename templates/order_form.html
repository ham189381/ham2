<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Place an Order</title>
    <style>
        body { font-family: Arial; background: #f4f4f4; padding: 20px; }
        .container { max-width: 100%;margin: auto; background: white; padding: 20px; border-radius: 10px; }
        input, textarea, button { width: 100%; padding: 10px; margin: 8px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: green; color: white; font-weight: bold; cursor: pointer; }
        .loc-btn { background: #2196F3; margin-bottom: 15px; }
        .map-link { background: #FF9800; margin-top: 5px; }
        .image-group { display: flex; gap: 10px; }
        .image-group div { flex: 1; }
        .coord-hint { font-size: 12px; color: #666; margin-top: -5px; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Place Your Order</h2>
    <form action="/submit_order" method="post" enctype="multipart/form-data">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="text" name="district" placeholder="District" required>
        <input type="text" name="town" placeholder="Town / Village" required>
        <input type="text" name="truck_name" placeholder="Truck Name / Type" required>
        <input type="text" name="material_service" placeholder="Material / Service (e.g., sand, transport)" required>

        <label>📍 Your Location (coordinates)</label>
        <textarea name="location" id="location" rows="2" placeholder="Click the button below to get your location" readonly required></textarea>
        <div class="coord-hint">Coordinates will be stored as latitude,longitude</div>
        <button type="button" class="loc-btn" onclick="getLocation()">📍 Get My Current Location</button>
        <button type="button" class="map-link" onclick="viewOnMap()" style="background:#FF9800;">🗺️ Preview on Google Maps</button>

        <input type="tel" name="phone" placeholder="Phone Number" required>

        <div class="image-group">
            <div>
                <label>Upload Image 1</label>
                <input type="file" name="image1" accept="image/*">
            </div>
            <div>
                <label>Upload Image 2 (optional)</label>
                <input type="file" name="image2" accept="image/*">
            </div>
        </div>

        <button type="submit">Submit Order</button>
    </form>
</div>

<script>
    let currentCoords = "";

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(showPosition, showError);
        } else {
            alert("Geolocation is not supported by this browser.");
        }
    }

    function showPosition(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        currentCoords = `${lat},${lon}`;
        const locationField = document.getElementById("location");
        locationField.value = currentCoords;
        locationField.style.background = "#e8f5e9";
    }

    function viewOnMap() {
        if (currentCoords) {
            window.open(`https://www.google.com/maps?q=${currentCoords}`, '_blank');
        } else {
            alert("First click 'Get My Current Location' to obtain coordinates.");
        }
    }

    function showError(error) {
        switch(error.code) {
            case error.PERMISSION_DENIED:
                alert("You denied the request for geolocation.");
                break;
            case error.POSITION_UNAVAILABLE:
                alert("Location information is unavailable.");
                break;
            case error.TIMEOUT:
                alert("The request to get user location timed out.");
                break;
            default:
                alert("An unknown error occurred.");
        }
    }
</script>
</body>
</html>
