<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Order</title>
    <style>
        body { font-family: Arial; background: #f4f4f4; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        input, textarea, button { width: 100%; padding: 10px; margin: 8px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #2196F3; color: white; font-weight: bold; cursor: pointer; }
        .image-group { display: flex; gap: 10px; }
        .image-group div { flex: 1; }
        .current-images img { max-width: 100px; margin: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Edit Order #{{ order.id }}</h2>
    <form action="/update_order/{{ order.id }}" method="post" enctype="multipart/form-data">
        <input type="text" name="name" value="{{ order.name }}" required>
        <input type="text" name="district" value="{{ order.district }}" required>
        <input type="text" name="town" value="{{ order.town }}" required>
        <input type="text" name="truck_name" value="{{ order.truck_name }}" required>
        <input type="text" name="material_service" value="{{ order.material_service }}" required>
        <textarea name="location" rows="2" required>{{ order.location }}</textarea>
        <input type="tel" name="phone" value="{{ order.phone }}" required>

        <div class="current-images">
            <p>Current images:</p>
            {% if order.image1 %}
                <img src="{{ order.image1 }}" alt="Image 1">
            {% endif %}
            {% if order.image2 %}
                <img src="{{ order.image2 }}" alt="Image 2">
            {% endif %}
        </div>

        <div class="image-group">
            <div>
                <label>Replace Image 1 (optional)</label>
                <input type="file" name="image1" accept="image/*">
            </div>
            <div>
                <label>Replace Image 2 (optional)</label>
                <input type="file" name="image2" accept="image/*">
            </div>
        </div>

        <button type="submit">Update Order</button>
        <a href="/view_orders" style="display: inline-block; margin-top: 10px;">Cancel</a>
    </form>
</div>
</body>
</html>
